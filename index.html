<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddities</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    html, body { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    .app-wrapper { font-family: 'Outfit', sans-serif; overflow-x: hidden; }
    .oddity-line { width: 24px; height: 2px; background: linear-gradient(to right, currentColor 0%, transparent 100%); }
    .attraction-card { transition: transform 0.35s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease; }
    .attraction-card:hover { transform: translateY(-6px); box-shadow: 0 0 24px rgba(138, 43, 226, 0.25); }
    .fade-up { opacity: 0; transform: translateY(30px); animation: fadeUp 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
    .skull-spin { animation: skullBounce 3s ease-in-out infinite; }
    @keyframes skullBounce { 0%, 100% { transform: translateY(0) rotate(-5deg); } 50% { transform: translateY(-8px) rotate(5deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    .scroll-container { scrollbar-width: none; -ms-overflow-style: none; }
    .scroll-container::-webkit-scrollbar { display: none; }
    .like-btn { transition: transform 0.2s ease; }
    .like-btn:hover { transform: scale(1.2); }
    .like-btn.liked { color: #8a2be2; }
    .filter-btn { transition: all 0.25s cubic-bezier(0.22, 1, 0.36, 1); }
    .filter-btn.active { transform: scale(1.05); }
  </style>
</head>
<body class="h-full">
  <div id="app" class="app-wrapper h-full w-full overflow-auto bg-[#12121a]">
    <nav id="nav-bar" class="sticky top-0 z-50 backdrop-blur-lg border-b" style="background: rgba(18,18,22,0.92); border-color: rgba(138,43,226,0.15);">
      <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <div class="skull-spin"><i data-lucide="skull" style="width:28px;height:28px;color:#8a2be2;"></i></div>
          <span id="nav-title" class="text-xl font-bold tracking-tight text-[#f5f0e8]">ODDITIES</span>
        </div>
        <button id="nav-saved-btn" class="flex items-center gap-2 px-4 py-2 rounded-full text-sm font-medium bg-[#8a2be2] text-[#12121a]">
          <i data-lucide="bookmark" style="width:14px;height:14px;"></i> <span>My Bucket List</span>
          <span id="saved-count" class="ml-2 px-1.5 py-0.5 rounded-full text-xs font-bold bg-[#12121a] text-[#8a2be2]">0</span>
        </button>
      </div>
    </nav>

    <header class="relative overflow-hidden py-20 sm:py-32" style="background:linear-gradient(135deg, #0a0a0f 0%, #1a0a2a 50%, #0f0a15 100%);">
      <div class="max-w-6xl mx-auto px-4 relative z-10">
        <h1 id="hero-heading" class="text-5xl sm:text-6xl font-black text-[#f5f0e8] mb-6">Explore the Strange,<br>the Mysterious</h1>
        <p class="text-lg text-[#d4c5e2] max-w-lg mb-8">Discover haunted asylums, cryptid hotspots, and mysteries that defy explanation.</p>
        <button id="explore-btn" class="px-8 py-4 rounded-lg font-bold bg-[#8a2be2] text-white">Explore Locations</button>
      </div>
    </header>

    <section class="py-12 bg-[#12121a]">
      <div class="max-w-6xl mx-auto px-4">
        <div class="flex items-center gap-3 mb-6">
          <div class="oddity-line h-8 text-[#8a2be2]"></div>
          <h2 class="text-xl font-bold text-[#f5f0e8]">Oddity of the Week</h2>
        </div>
        <div id="featured-card" class="rounded-2xl overflow-hidden cursor-pointer flex bg-[#1e1e28] border border-purple-900/20">
          </div>
      </div>
    </section>

    <section class="py-14 bg-[#12121a]">
      <div class="max-w-6xl mx-auto px-4">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6 mb-8">
          <h2 class="text-3xl font-bold text-[#f5f0e8]">Discover Oddities</h2>
          <div class="search-input-wrapper flex items-center gap-2 px-4 py-2.5 rounded-full bg-white/5 border border-white/10 w-full sm:w-64">
            <i data-lucide="search" class="w-4 h-4 text-[#a09a8e]"></i>
            <input id="search-input" type="text" placeholder="Search..." class="bg-transparent outline-none w-full text-sm text-[#f5f0e8]">
          </div>
        </div>
        
        <div class="scroll-container flex gap-2 overflow-x-auto pb-6">
          <button class="filter-btn active px-5 py-2 rounded-full text-sm font-medium bg-[#8a2be2] text-white" data-filter="all">All Oddities</button>
          <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium bg-white/5 text-[#a09a8e]" data-filter="haunted">Haunted</button>
          <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium bg-white/5 text-[#a09a8e]" data-filter="historic">Historic</button>
          <button class="filter-btn px-5 py-2 rounded-full text-sm font-medium bg-white/5 text-[#a09a8e]" data-filter="cryptid">Cryptid</button>
        </div>

        <div id="trip-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
          </div>
      </div>
    </section>

    <footer class="py-10 bg-[#0e0e14] border-t border-purple-900/20">
      <div class="max-w-6xl mx-auto px-4 text-center">
        <p class="text-xs text-[#a09a8e]">© 2026 The Odd Phoenix LLC • Embrace the Strange</p>
      </div>
    </footer>

    <div id="featured-info-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
      <div class="w-full max-w-2xl bg-[#1e1e28] rounded-2xl overflow-hidden max-h-[90vh] overflow-y-auto border border-purple-900/30">
        <div class="p-6 border-b border-white/10 flex justify-between items-center">
          <h2 id="info-modal-title" class="text-2xl font-bold text-white"></h2>
          <button id="info-modal-close" class="p-2 bg-white/5 rounded-full text-white hover:bg-white/10"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <div id="info-modal-content" class="p-6"></div>
      </div>
    </div>
  </div>

  <script>
    // DATA ARRAY
    const trips = [
      { id: 'eureka-springs-town', title: 'Eureka Springs, Arkansas', region: 'Carroll County, AR', category: 'historic', tags: ['Historic Town'], tagColors: ['#8a2be2'], desc: 'Built into the Ozark Mountains during the 1880s silver boom...', history: 'Eureka Springs emerged during the 1880s silver boom...', image: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=800&fit=crop', gradient: 'linear-gradient(135deg, #2a0a20, #1a0a10)' },
      { id: 'san-luis-valley', title: 'San Luis Valley, Colorado', region: 'South-Central CO', category: 'cryptid', tags: ['UFO Hotspot'], tagColors: ['#8a2be2'], desc: 'The San Luis Valley is one of North America\'s most active UFO hotspots...', history: 'The San Luis Valley has been a center of activity since pre-Columbian times...', image: 'https://images.unsplash.com/photo-1444080748397-f442aa95c3e5?w=800&fit=crop', gradient: 'linear-gradient(135deg, #1a3a0a, #0a2a1a)' },
      { id: 'waverly-hills', title: 'Waverly Hills Sanatorium, Kentucky', region: 'Louisville, KY', category: 'haunted', tags: ['Haunted'], tagColors: ['#8a2be2'], desc: 'Built in 1910, this tuberculosis hospital is said to be one of America\'s most haunted places.', history: 'Over 60,000 patients died within these walls...', image: 'https://images.unsplash.com/photo-1518392846015-55a9cc003b25?w=800&fit=crop', gradient: 'linear-gradient(135deg, #2a0a40, #1a1020)' },
      { id: 'stanley-hotel', title: 'The Stanley Hotel, Colorado', region: 'Estes Park, CO', category: 'haunted', tags: ['The Shining'], tagColors: ['#8a2be2'], desc: 'Luxury hotel that inspired Stephen King\'s "The Shining".', history: 'In 1974, Stephen King spent one night here and conceived his masterpiece.', image: 'https://images.unsplash.com/photo-1551632706-5386c5193122?w=800&fit=crop', gradient: 'linear-gradient(135deg, #1a2a0a, #0a1a1a)' }
      // Add more as needed
    ];

    let likedTrips = new Set();
    let currentFilter = 'all';

    // APP LOGIC
    function renderFeaturedOddity() {
      const now = new Date();
      const start = new Date(now.getFullYear(), 0, 1);
      const weekNum = Math.floor((now - start) / 86400000 / 7);
      const featured = trips[weekNum % trips.length];
      
      const card = document.getElementById('featured-card');
      card.innerHTML = `
        <div class="w-1/3 min-h-[250px]"><img src="${featured.image}" class="h-full w-full object-cover"></div>
        <div class="w-2/3 p-8 flex flex-col justify-center">
          <span class="text-purple-500 text-xs font-bold uppercase mb-2">${featured.region}</span>
          <h3 class="text-3xl font-bold text-white mb-3">${featured.title}</h3>
          <p class="text-zinc-400 text-sm line-clamp-3 mb-6">${featured.desc}</p>
          <button class="text-purple-400 font-bold text-sm text-left">Explore the mystery →</button>
        </div>
      `;
      card.onclick = () => openDetailModal(featured);
    }

    function createTripCard(trip, index) {
      const card = document.createElement('div');
      card.className = "attraction-card bg-[#1e1e28] rounded-xl overflow-hidden border border-white/5 cursor-pointer";
      card.innerHTML = `
        <img src="${trip.image}" class="h-48 w-full object-cover">
        <div class="p-5">
          <span class="text-purple-500 text-[10px] font-bold uppercase">${trip.category}</span>
          <h3 class="text-white font-bold text-lg mt-1">${trip.title}</h3>
          <p class="text-zinc-500 text-xs mt-2 line-clamp-2">${trip.desc}</p>
        </div>
      `;
      card.onclick = () => openDetailModal(trip);
      return card;
    }

    function renderGrid() {
      const grid = document.getElementById('trip-grid');
      grid.innerHTML = '';
      const filtered = currentFilter === 'all' ? trips : trips.filter(t => t.category === currentFilter);
      filtered.forEach((trip, i) => grid.appendChild(createTripCard(trip, i)));
    }

    function openDetailModal(trip) {
      document.getElementById('info-modal-title').textContent = trip.title;
      document.getElementById('info-modal-content').innerHTML = `
        <img src="${trip.image}" class="w-full h-64 object-cover rounded-xl mb-6">
        <p class="text-zinc-300 leading-relaxed mb-6">${trip.desc}</p>
        <h4 class="text-purple-400 font-bold mb-2">History & Lore</h4>
        <p class="text-zinc-400 text-sm">${trip.history || 'Discovery pending...'}</p>
      `;
      document.getElementById('featured-info-modal').classList.remove('hidden');
    }

    // STARTUP
    window.onload = () => {
      renderGrid();
      renderFeaturedOddity();
      lucide.createIcons();

      document.getElementById('info-modal-close').onclick = () => {
        document.getElementById('featured-info-modal').classList.add('hidden');
      };

      document.getElementById('explore-btn').onclick = () => {
        document.getElementById('grid-section').scrollIntoView({ behavior: 'smooth' });
      };

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.onclick = () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('bg-[#8a2be2]', 'text-white'));
          btn.classList.add('bg-[#8a2be2]', 'text-white');
          currentFilter = btn.dataset.filter;
          renderGrid();
        };
      });
    };
  </script>
</body>
</html>
